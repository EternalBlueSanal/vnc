- name: 3. Motorları Ateşle ve Pinggy Köprüsünü Kur
        run: |
          # 1. QEMU: Windows 445 -> GitHub 4445
          sudo qemu-system-i386 -m 4G -cpu core2duo -smp 2 -drive file=kurban_disk.qcow2,format=qcow2 -boot c -vnc :1 -net nic,model=virtio -net user,hostfwd=tcp::4445-:445 &
          
          # 2. VNC Ekranı (Cloudflare)
          websockify --web /usr/share/novnc/ 6080 localhost:5901 &
          sleep 5
          cloudflared tunnel --url http://localhost:6080 > vnc.log 2>&1 &
          
          # 3. PINGGY TCP TÜNELİ: Daha uzun bekleme ve tam log basma
          # SSH bağlantısını başlatıyoruz
          ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R0:localhost:4445 tcp@pinggy.io > pinggy.log 2>&1 &
          
          # Pinggy'nin adresi ataması için biraz daha fazla zaman veriyoruz (20 sn)
          sleep 20
          
          echo "================================================================"
          echo "🔥 SİBER KÖPRÜ RAPORU"
          VNC_URL=$(cat vnc.log | grep -o 'https://.*\.trycloudflare\.com' | head -n 1)
          echo "🖥️ EKRAN LİNKİ: ${VNC_URL}/vnc.html"
          
          echo "--- PINGGY HAM LOG ÇIKTISI (ADRES BURADA YAZAR) ---"
          cat pinggy.log | grep -i "tcp://" || echo "⚠️ Adres henüz atanmadı, logu kontrol et!"
          echo "================================================================"
