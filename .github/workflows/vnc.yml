name: Win7_Hazir_Kurban_Poligonu

on: workflow_dispatch 

jobs:
  Hacker_Mevzisi:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Siber Cephaneliği Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install qemu-system-x86 novnc websockify python3-pip -y -qq
          sudo pip3 install gdown # Drive'dan büyük dosya çekmek için özel araç
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 2. Hazır Kurbanı Drive'dan İndir (Kurulum Yok!)
        run: |
          # Gdown, Google'ın "bu dosya büyük, virüs taraması yapılamıyor" uyarısını otomatik aşar.
          gdown --id "14PZmQ-yUlfNWo8djcjzxuBOH0nxo6Ms5" -O kurban_disk.qcow2

      - name: 3. Motorları Ateşle ve Görünmez Tüneli Kaz
        run: |
          # DİKKAT: -cdrom parametresini sildik ve -boot c (Harddiskten başla) yaptık!
          sudo qemu-system-i386 -m 4G -cpu core2duo -smp 2 -drive file=kurban_disk.qcow2,format=qcow2 -boot c -vnc :1 -net nic,model=virtio -net user &
          websockify --web /usr/share/novnc/ 6080 localhost:5901 &
          sleep 5
          cloudflared tunnel --url http://localhost:6080 > tunnel.log 2>&1 &
          sleep 10
          echo "================================================================"
          echo "🔥 SİBER KÖPRÜ (HAZIR İMAJ) BAŞARIYLA KURULDU!"
          URL=$(cat tunnel.log | grep -o 'https://.*\.trycloudflare\.com' | head -n 1)
          echo "🔗 TIKLA VE BAĞLAN: ${URL}/vnc.html"
          echo "================================================================"

      - name: 4. Hedefi Hayatta Tut
        run: |
          while true; do sleep 300; echo "Poligon aktif, Windows 7 ayakta..."; done
