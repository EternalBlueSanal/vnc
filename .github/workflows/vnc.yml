name: Win7_Pinggy_Port_Operasyonu

on: workflow_dispatch 

jobs:
  Hacker_Mevzisi:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Siber Cephaneliği Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install qemu-system-x86 novnc websockify python3-pip -y -qq
          sudo pip3 install gdown
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 2. Hazır Kurbanı Drive'dan İndir
        run: |
          gdown --id "14PZmQ-yUlfNWo8djcjzxuBOH0nxo6Ms5" -O kurban_disk.qcow2

      - name: 3. Motorları Ateşle ve Pinggy Köprüsünü Kur
        run: |
          # 1. QEMU: Windows 445 -> GitHub 4445
          sudo qemu-system-i386 -m 4G -cpu core2duo -smp 2 -drive file=kurban_disk.qcow2,format=qcow2 -boot c -vnc :1 -net nic,model=virtio -net user,hostfwd=tcp::4445-:445 &
          
          # 2. VNC Ekranı (Cloudflare)
          websockify --web /usr/share/novnc/ 6080 localhost:5901 &
          sleep 5
          cloudflared tunnel --url http://localhost:6080 > vnc.log 2>&1 &
          
          # 3. PINGGY TCP TÜNELİ: GitHub 4445 portunu dünyaya açıyoruz
          # -R0 parametresi rastgele bir port atanmasını sağlar.
          ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R0:localhost:4445 tcp@pinggy.io > pinggy.log 2>&1 &
          
          sleep 15
          echo "================================================================"
          echo "🔥 PINGGY SİBER TÜNELİ AKTİF!"
          VNC_URL=$(cat vnc.log | grep -o 'https://.*\.trycloudflare\.com' | head -n 1)
          echo "🖥️ EKRAN LİNKİ: ${VNC_URL}/vnc.html"
          
          # Pinggy adresini logdan ayıklıyoruz
          PINGGY_ADDR=$(grep -oE 'tcp://[a-z0-9.-]+:[0-9]+' pinggy.log | head -n 1)
          echo "💣 METASPLOIT HEDEFİ: ${PINGGY_ADDR}"
          echo "================================================================"

      - name: 4. Hedefi Hayatta Tut
        run: |
          while true; do sleep 300; echo "Tünel sızdırmıyor, poligon ayakta..."; done
