name: Win7_Kesin_Port_Poligonu

on: workflow_dispatch 

jobs:
  Hacker_Mevzisi:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Siber Cephaneliği Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install qemu-system-x86 novnc websockify python3-pip -y -qq
          sudo pip3 install gdown
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          # Bore'u tekrar indiriyoruz (En stabil TCP tüneli)
          wget -q https://github.com/ekzhang/bore/releases/download/v0.4.1/bore-v0.4.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore-v0.4.1-x86_64-unknown-linux-musl.tar.gz

      - name: 2. Hazır Kurbanı Drive'dan İndir
        run: |
          gdown --id "14PZmQ-yUlfNWo8djcjzxuBOH0nxo6Ms5" -O kurban_disk.qcow2

      - name: 3. Motorları Ateşle ve "Bore" Köprüsünü Kur
        run: |
          # 1. QEMU: Windows 445 -> GitHub 4445 (Sızma Portu)
          sudo qemu-system-i386 -m 4G -cpu core2duo -smp 2 -drive file=kurban_disk.qcow2,format=qcow2 -boot c -vnc :1 -net nic,model=virtio -net user,hostfwd=tcp::4445-:445 &
          
          # 2. VNC Ekranı (Cloudflare)
          websockify --web /usr/share/novnc/ 6080 localhost:5901 &
          sleep 5
          cloudflared tunnel --url http://localhost:6080 > vnc.log 2>&1 &
          
          # 3. BORE TCP TÜNELİ: GitHub 4445'i dünyaya açıyoruz
          ./bore local 4445 --to bore.pub > bore.log 2>&1 &
          
          # Tünelin oturması için 20 saniye bekleyelim
          sleep 20
          
          echo "================================================================"
          echo "🔥 SİBER OPERASYON MERKEZİ"
          VNC_URL=$(cat vnc.log | grep -o 'https://.*\.trycloudflare\.com' | head -n 1)
          echo "🖥️ EKRAN LİNKİ: ${VNC_URL}/vnc.html"
          
          echo "--- BORE SALDIRI HEDEFİ ---"
          # Logun tamamını ekrana basıyoruz ki kaçacak yer kalmasın!
          cat bore.log
          echo "================================================================"

      - name: 4. Hedefi Hayatta Tut
        run: |
          while true; do sleep 300; echo "Siber hatlar meşgul, Windows ayakta..."; done
