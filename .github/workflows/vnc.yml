name: Win7_Turbo_VNC_Poligonu

on: workflow_dispatch 

jobs:
  Hacker_Mevzisi:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Siber Cephaneliği Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install qemu-system-x86 python3-pip -y -qq
          sudo pip3 install gdown
          # Bore'u indiriyoruz (Hem VNC hem Saldırı portu için)
          wget -q https://github.com/ekzhang/bore/releases/download/v0.4.1/bore-v0.4.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore-v0.4.1-x86_64-unknown-linux-musl.tar.gz

      - name: 2. Hazır Kurbanı Drive'dan İndir (Wget Bypass)
        run: |
          # Google Drive büyük dosya onayını bypass eden siber komut:
          FILE_ID="14PZmQ-yUlfNWo8djcjzxuBOH0nxo6Ms5"
          CONFIRM=$(wget --quiet --save-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate "https://docs.google.com/uc?export=download&id=$FILE_ID" -O- | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1\n/p')
          wget --load-cookies /tmp/cookies.txt "https://docs.google.com/uc?export=download&confirm=$CONFIRM&id=$FILE_ID" -O kurban_disk.qcow2
          rm -rf /tmp/cookies.txt
          
      - name: 3. Turbo Motorları Ateşle
        run: |
          # DİKKAT: -vga virtio (Hızlı Görüntü) ve -smp 4 (Daha fazla çekirdek) ekledik
          sudo qemu-system-i386 -m 4G -cpu core2duo -smp 4 -vga virtio -display vnc=:1 -drive file=kurban_disk.qcow2,format=qcow2 -boot c -net nic,model=virtio -net user,hostfwd=tcp::4445-:445 &
          
          sleep 5
          
          # 1. Tünel: GÖRÜNTÜ İÇİN (VNC Portu 5901'i Bore üzerinden açıyoruz)
          ./bore local 5901 --to bore.pub > vnc_bore.log 2>&1 &
          
          # 2. Tünel: SALDIRI İÇİN (SMB Portu 4445'i Bore üzerinden açıyoruz)
          ./bore local 4445 --to bore.pub > attack_bore.log 2>&1 &
          
          sleep 15
          echo "================================================================"
          echo "⚡ TURBO VNC VE SALDIRI HATTI AKTİF!"
          
          VNC_ADDR=$(grep -oE 'bore\.pub:[0-9]+' vnc_bore.log | head -n 1)
          echo "🖥️ VNC BAĞLANTI ADRESİ: ${VNC_ADDR}"
          
          ATTACK_ADDR=$(grep -oE 'bore\.pub:[0-9]+' attack_bore.log | head -n 1)
          echo "💣 METASPLOIT HEDEFİ: ${ATTACK_ADDR}"
          echo "================================================================"

      - name: 4. Hedefi Hayatta Tut
        run: |
          while true; do sleep 300; echo "Sistem uçuşta, poligon aktif..."; done
