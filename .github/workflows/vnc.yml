name: Win7_Kali_Siber_Duello

on: workflow_dispatch 

jobs:
  Hacker_Mevzisi:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Siber Cephaneliği Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install qemu-system-x86 python3-pip -y -qq
          # Bore Tüneli (TCP köprüsü için)
          wget -q https://github.com/ekzhang/bore/releases/download/v0.4.1/bore-v0.4.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore-v0.4.1-x86_64-unknown-linux-musl.tar.gz

      - name: 2. Yeni Kurbanı Drive'dan İndir (Siber Bypass)
        run: |
          # Eski dosya varsa temizleyelim
          rm -f kurban_disk.qcow2
          
          # YENİ DOSYA ID'Sİ BURADA:
          FILE_ID="1eKZQu8NEMgP5TsGlbpFX9Ub1l_xrgvOh"
          
          # Google onay sayfasından çerezleri ve onay kodunu alıyoruz
          curl -L -c cookies.txt "https://docs.google.com/uc?export=download&id=${FILE_ID}" | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1\n/p' > confirm.txt
          
          # Onay koduyla gerçek dosyayı söküp alıyoruz
          curl -L -b cookies.txt "https://docs.google.com/uc?export=download&confirm=$(cat confirm.txt)&id=${FILE_ID}" -o kurban_disk.qcow2
          
          # Temizlik
          rm cookies.txt confirm.txt
          
          # Dosya boyut kontrolü (Min 100MB)
          FILE_SIZE=$(stat -c%s "kurban_disk.qcow2")
          if [ $FILE_SIZE -lt 100000000 ]; then
            echo "❌ HATA: Google kotası engelledi! Dosya inmedi."
            exit 1
          fi

      - name: 3. Windows 7'yi (Kurban) Ateşle
        run: |
          # 64-bit desteği ve optimize edilmiş CPU ile Win7'yi başlatıyoruz
          sudo qemu-system-x86_64 \
            -m 2G \
            -cpu max \
            -smp 2 \
            -vga std \
            -display vnc=:1 \
            -drive file=kurban_disk.qcow2,format=qcow2 \
            -boot c \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::4445-:445 &
          
      - name: 4. Kali Linux'u (Saldırgan) Kur ve SSH'ı Hazırla
        run: |
          # Kali Docker konteynerini başlatıyoruz (Host ağı üzerinden bağlantı)
          docker run -d --net=host --name kali_saldırgan kalilinux/kali-rolling sleep infinity
          
          # SSH ve sızma araçlarının kurulumu
          docker exec kali_saldırgan apt-get update -y
          docker exec kali_saldırgan apt-get install -y openssh-server metasploit-framework iproute2
          
          # SSH yapılandırması (User: root, Şifre: kral123)
          docker exec kali_saldırgan mkdir -p /run/sshd
          docker exec kali_saldırgan bash -c "echo 'root:kral123' | chpasswd"
          docker exec kali_saldırgan sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          docker exec kali_saldırgan service ssh start

      - name: 5. Siber Köprüleri (Bore Tünelleri) Başlat
        run: |
          # 1. Tünel: Win7 Ekranı (VNC)
          ./bore local 5901 --to bore.pub > vnc_bore.log 2>&1 &
          
          # 2. Tünel: Kali Komut Satırı (SSH)
          ./bore local 22 --to bore.pub > ssh_bore.log 2>&1 &
          
          sleep 20
          echo "================================================================"
          echo "🔥 SİBER DÜELLO ALANI YENİ HEDEFLE HAZIR!"
          
          VNC_ADDR=$(grep -oE 'bore\.pub:[0-9]+' vnc_bore.log | head -n 1)
          echo "🖥️ WIN7 EKRANI (VNC Viewer ile): ${VNC_ADDR}"
          
          SSH_ADDR=$(grep -oE 'bore\.pub:[0-9]+' ssh_bore.log | head -n 1)
          SSH_HOST=$(echo $SSH_ADDR | cut -d':' -f1)
          SSH_PORT=$(echo $SSH_ADDR | cut -d':' -f2)
          echo "💀 KALI SSH BAĞLANTISI: ssh root@${SSH_HOST} -p ${SSH_PORT}"
          echo "🔑 KALI ŞİFRE: kral123"
          echo "----------------------------------------------------------------"
          echo "🎯 KALI İÇİNDEN SALDIRI HEDEFİ: 127.0.0.1:4445"
          echo "================================================================"

      - name: 6. Operasyonu Hayatta Tut
        run: |
          while true; do sleep 300; echo "Sistem uçuşta, kurban tetikte..."; done
