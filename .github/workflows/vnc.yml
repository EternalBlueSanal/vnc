name: Win7_GigaFiber_IPv6_Turbo

on: 
  workflow_dispatch: # Manuel başlatma butonu

jobs:
  Siber_Operasyon:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Sistem Gereksinimlerini Kuşan
        run: |
          sudo apt-get update -qq
          sudo apt-get install qemu-system-x86 python3-pip qemu-utils ntfs-3g tmate aria2 -y -qq

      - name: 6. Kali Linux & Tmate Terminali Başlat
        run: |
          docker run -d --net=host --name kali_saldirgan kalilinux/kali-rolling sleep infinity
          docker exec kali_saldirgan apt-get update -y
          docker exec kali_saldirgan apt-get install -y openssh-server metasploit-framework tmate
          docker exec kali_saldirgan tmate -S /tmp/tmate.sock new-session -d
          docker exec kali_saldirgan tmate -S /tmp/tmate.sock wait tmate-ready
          echo "================================================================"
          echo "💀 KALI TERMİNAL KOMUTUN (Buradan Sızacağız):"
          docker exec kali_saldirgan tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          echo "================================================================"

      - name: 7. Siber Köprüleri (VNC/RDP) Ateşle
        run: |
          rm -f *.log
          # VNC Portu (5901)
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:5901 tcp@a.pinggy.io > vnc.log 2>&1 &
          # RDP Portu (3389)
          ssh -o StrictHostKeyChecking=no -T -R 80:localhost:3389 nokey@localhost.run > rdp.log 2>&1 &
          sleep 35
          echo "================================================================"
          echo "🖥️ VNC ADRESİ (Ekrana Bakmak İçin):"
          grep -oE 'tcp://[a-zA-Z0-9.-]+:[0-9]+' vnc.log || cat vnc.log
          echo "🚀 RDP ADRESİ (Windows'a Bağlanmak İçin):"
          grep -oE '[a-zA-Z0-9.-]+\.lhr\.life' rdp.log | head -n 1 || cat rdp.log
          echo "================================================================"

      - name: 8. Operasyonu Hayatta Tut
        run: |
          while true; do sleep 300; echo "Siber üs ayakta..."; done
