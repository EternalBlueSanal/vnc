name: Win7_Turbo_VNC_Poligonu

on: workflow_dispatch 

jobs:
  Hacker_Mevzisi:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Siber Cephaneliği Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install qemu-system-x86 python3-pip -y -qq
          # Bore'u indiriyoruz (TCP Tünel Kralı)
          wget -q https://github.com/ekzhang/bore/releases/download/v0.4.1/bore-v0.4.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore-v0.4.1-x86_64-unknown-linux-musl.tar.gz
          sudo pip3 install gdown

      - name: 2. Hazır Kurbanı Drive'dan İndir (Kurulum Yok!)

        run: |

          # Gdown, Google'ın "bu dosya büyük, virüs taraması yapılamıyor" uyarısını otomatik aşar.

          gdown --id "1xz4LdlcVc5l_Cxh93YLYgBYE-mzweont" -O kurban_disk.qcow2

      - name: 3. Turbo Motorları Ateşle (x86_64 Fix)
        run: |
          # Düzeltmeler: 
          # 1. qemu-system-x86_64 (64-bit desteği için)
          # 2. -cpu max (En yüksek performans için)
          # 3. -vga std (VNC'de en stabil görüntü için)
          # 4. -smp 2 (GitHub Action limitlerine uygun stabilite)
          sudo qemu-system-x86_64 \
            -m 4G \
            -cpu max \
            -smp 2 \
            -vga std \
            -display vnc=:1 \
            -drive file=kurban_disk.qcow2,format=qcow2 \
            -boot c \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::4445-:445 &
          
          sleep 10
          
          # Tünelleri Başlat
          ./bore local 5901 --to bore.pub > vnc_bore.log 2>&1 &
          ./bore local 4445 --to bore.pub > attack_bore.log 2>&1 &
          
          sleep 15
          echo "================================================================"
          echo "⚡ SİBER POLİGON AKTİF VE TURBO MODDA!"
          
          VNC_ADDR=$(grep -oE 'bore\.pub:[0-9]+' vnc_bore.log | head -n 1)
          echo "🖥️ VNC BAĞLANTI (VNC Viewer ile gir): ${VNC_ADDR}"
          
          ATTACK_ADDR=$(grep -oE 'bore\.pub:[0-9]+' attack_bore.log | head -n 1)
          echo "💣 METASPLOIT HEDEFİ (RHOST:RPORT): ${ATTACK_ADDR}"
          echo "================================================================"

      - name: 4. Hedefi Hayatta Tut
        run: |
          while true; do sleep 300; echo "Poligon aktif, kurban tetikte..."; done
