name: Win7_Kali_Siber_Duello

on: workflow_dispatch 

jobs:
  Hacker_Mevzisi:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Siber Cephaneliği Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install qemu-system-x86 python3-pip qemu-utils ntfs-3g -y -qq

      - name: 2. Kurbanı Kendi Üssümüzden İndir (Aria2 Turbo Mod)
        run: |
          rm -f kurban_disk.qcow2
          sudo apt-get install aria2 -y -qq
          aria2c -x 16 -s 16 -k 1M --console-log-level=warn --summary-interval=10 -d . -o kurban_disk.qcow2 "https://generation-adapter-writes-seek.trycloudflare.com/win7.qcow2"
          
          FILE_SIZE=$(stat -c%s "kurban_disk.qcow2")
          if [ $FILE_SIZE -lt 100000000 ]; then
            echo "❌ HATA: Dosya tam inmedi!"
            exit 1
          fi

      - name: 3. Kurbana Çip Tak (Offline Disk Enjeksiyonu)
        run: |
          echo "Siber cerrahi başlıyor..."
          sudo modprobe nbd max_part=8
          sudo qemu-nbd -c /dev/nbd0 kurban_disk.qcow2
          sleep 3
          sudo mkdir -p /mnt/win
          sudo mount -t ntfs-3g /dev/nbd0p2 /mnt/win || sudo mount -t ntfs-3g /dev/nbd0p1 /mnt/win
          
          AUTO_RUN="/mnt/win/ProgramData/Microsoft/Windows/Start Menu/Programs/Startup/siber_ayar.bat"
          sudo bash -c "cat > '$AUTO_RUN'" << 'EOF'
          @echo off
          :: Güvenlik kalkanlarını indir ve RDP'yi hazırla
          netsh advfirewall set allprofiles state off
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          net start termservice
          net user Kral kral123 /add
          net localgroup Administrators Kral /add
          del "%~f0"
          EOF
          
          sudo umount /mnt/win
          sudo qemu-nbd -d /dev/nbd0
          echo "✅ Çip yerleştirildi!"

      - name: 4. Windows 7'yi (Kurban) Ateşle
        run: |
          sudo qemu-system-x86_64 \
            -m 2G -cpu max -smp 2 -vga std -usb -device usb-tablet -display vnc=:1 \
            -drive file=kurban_disk.qcow2,format=qcow2 -boot c \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::4445-:445,hostfwd=tcp::3389-:3389 &
          sleep 10
          
      - name: 5. Kali Linux'u (Saldırgan) Kur ve SSH'ı Hazırla
        run: |
          docker run -d --net=host --name kali_saldirgan kalilinux/kali-rolling sleep infinity
          docker exec kali_saldirgan apt-get update -y
          docker exec kali_saldirgan apt-get install -y openssh-server metasploit-framework iproute2
          docker exec kali_saldirgan bash -c "echo 'root:kral123' | chpasswd"
          docker exec kali_saldirgan bash -c "echo 'Port 2222' >> /etc/ssh/sshd_config"
          docker exec kali_saldirgan bash -c "echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config"
          docker exec kali_saldirgan bash -c "echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config"
          docker exec kali_saldirgan service ssh start

      - name: 6. Siber Köprüleri (Tek Boru - Master Tünel) Başlat
        run: |
          rm -f siber_tünel.log
          # TEK SSH BAĞLANTISI, 3 FARKLI PORT! (En Garanti Yöntem)
          ssh -o StrictHostKeyChecking=no -p 443 \
              -R 0:localhost:5901 \
              -R 0:localhost:2222 \
              -R 0:localhost:3389 \
              tcp@a.pinggy.io > siber_tünel.log 2>&1 &
          
          echo "Siber otoban inşa ediliyor, 45 saniye bekle Kral..."
          sleep 45
          
          echo "================================================================"
          echo "🔥 MASTER TÜNEL ÜZERİNDEN TÜM SİSTEMLER AKTİF!"
          echo "----------------------------------------------------------------"
          
          # Tüm linkleri logdan ayıklayalım
          grep -oE 'tcp://[a-zA-Z0-9.-]+:[0-9]+' siber_tünel.log > linkler.txt
          
          echo "🖥️ VNC ADRESİ (Ekrana Tıklamak İçin):"
          sed -n '1p' linkler.txt || echo "Oluşmadı..."
          
          echo "💀 KALI SSH ADRESİ (Saldırı Terminali):"
          sed -n '2p' linkler.txt || echo "Oluşmadı..."
          
          echo "🚀 RDP (UZAK MASAÜSTÜ) ADRESİ (Yağ Gibi Bağlantı):"
          sed -n '3p' linkler.txt || echo "Oluşmadı..."
          
          echo "================================================================"
          echo "Kullanıcı: Kral | Şifre: kral123"
          echo "⚠️ NOT: Eğer üstteki linkler boş gelirse 'cat siber_tünel.log' ile manuel bak."
          echo "================================================================"
          
      - name: 7. Operasyonu Hayatta Tut
        run: |
          while true; do sleep 300; echo "Sistem uçuşta, kurban tetikte..."; done
