name: Win7_Direkt_Port_Poligonu

on: workflow_dispatch 

jobs:
  Hacker_Mevzisi:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Siber Cephaneliği Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install qemu-system-x86 novnc websockify python3-pip -y -qq
          sudo pip3 install gdown
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 2. Hazır Kurbanı Drive'dan İndir
        run: |
          gdown --id "14PZmQ-yUlfNWo8djcjzxuBOH0nxo6Ms5" -O kurban_disk.qcow2

      - name: 3. Motorları Ateşle ve Portu Dünyaya Aç
        run: |
          # 1. QEMU: Windows'un 445 portunu, GitHub makinesinde 4445'e bağlıyoruz
          sudo qemu-system-i386 -m 4G -cpu core2duo -smp 2 -drive file=kurban_disk.qcow2,format=qcow2 -boot c -vnc :1 -net nic,model=virtio -net user,hostfwd=tcp::4445-:445 &
          
          # 2. VNC Ekranı (Tıklayıp izlemek için)
          websockify --web /usr/share/novnc/ 6080 localhost:5901 &
          sleep 5
          cloudflared tunnel --url http://localhost:6080 > vnc_tunnel.log 2>&1 &
          
          # 3. KRİTİK ADIM: SSH ile Portu Dışarı Aktarma (Localhost.run kullanıyoruz)
          # Bu komut GitHub'daki 4445'i internete açar ve sana bir adres verir.
          ssh -o StrictHostKeyChecking=no -R 80:localhost:4445 nokey@localhost.run > port_tunnel.log 2>&1 &
          
          sleep 15
          echo "================================================================"
          echo "🔥 SİBER KAPI ARALANDI!"
          VNC_URL=$(cat vnc_tunnel.log | grep -o 'https://.*\.trycloudflare\.com' | head -n 1)
          echo "🖥️ EKRAN LİNKİ: ${VNC_URL}/vnc.html"
          
          # Tünel adresini logdan çekiyoruz
          TUNNEL_ADDR=$(cat port_tunnel.log | grep -oE '[a-zA-Z0-9.-]+\.lhr\.life' | head -n 1)
          echo "💣 METASPLOIT HEDEFİ (RHOST): ${TUNNEL_ADDR}"
          echo "💣 METASPLOIT PORTU (RPORT): 80"
          echo "================================================================"

      - name: 4. Hedefi Hayatta Tut
        run: |
          while true; do sleep 300; echo "Tünel aktif, mermiler havada..."; done
