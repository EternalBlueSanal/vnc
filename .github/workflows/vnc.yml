name: Win7_Kali_Siber_Duello_Otomatik

on: workflow_dispatch 

jobs:
  Hacker_Mevzisi:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Siber Cephaneliği Kur
        run: |
          sudo apt-get update -qq
          sudo apt-get install qemu-system-x86 python3-pip qemu-utils ntfs-3g tmate -y -qq

      # --- KRİTİK ADIM: IPv6 KÖPRÜSÜ (WARP) ---
      - name: 2. IPv6 Otoyolunu Aktif Et (WARP)
        uses: fscarmen/warp-on-actions@v1.1
        with:
          stack: dual # Hem IPv4 hem IPv6'yı aynı anda konuşturur

      - name: 3. Kurbanı İndir (IPv6 GigaFiber Taarruzu - 100 MB/s Hedefi)
        run: |
          rm -f kurban_disk.qcow2
          sudo apt-get install aria2 -y -qq
          
          # Doğrudan Pi 5'in IPv6 adresine 16 kanca ile saldırıyoruz!
          # Arada Cloudflare Proxy (Turuncu Bulut) olmadığı için hız limitimiz yok.
          aria2c -x 16 -s 16 -k 1M \
            --console-log-level=warn \
            --summary-interval=1 \
            --check-certificate=false \
            -d . -o kurban_disk.qcow2 "http://[2a02:ff0:3316:90cb:8aa2:9eff:feb6:3050]:8080/win7.qcow2"
          
          FILE_SIZE=$(stat -c%s "kurban_disk.qcow2")
          if [ $FILE_SIZE -lt 100000000 ]; then
            echo "❌ HATA: Dosya tam inmedi veya bağlantı reddedildi!"
            exit 1
          fi
          echo "✅ Ganimet GigaFiber otoyolundan saf hızla indirildi!"

      # ... (Diğer adımlar: Çip Takma, QEMU Başlatma, Kali vb. aynen devam eder) ...
